<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TayyebGo — Order Food & More</title>
  <meta name="description" content="Order food, groceries, pharmacy items, and anything you need — delivered in minutes.">
  <link rel="icon" type="image/svg+xml" href="../website/assets/images/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Noto+Sans+Arabic:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ========================================
       CSS Variables
       ======================================== */
    :root {
      --primary: #FF5A2C;
      --primary-dark: #E84A1E;
      --primary-light: #FF7A52;
      --accent: #8B5CF6;
      --accent-dark: #7C3AED;
      --success: #22C55E;
      --warning: #F59E0B;
      --error: #EF4444;
      --info: #06B6D4;

      --bg: #FAFBFA;
      --surface: #FFFFFF;
      --text: #0A0F0D;
      --text-secondary: #5A6B63;
      --text-tertiary: #8A9A92;
      --border: #E5E9E7;

      --radius-sm: 8px;
      --radius: 12px;
      --radius-lg: 20px;
      --radius-xl: 28px;

      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
      --shadow-lg: 0 12px 40px rgba(0,0,0,0.1);

      --glass-bg: rgba(255,255,255,0.72);
      --glass-border: rgba(255,255,255,0.25);

      --sidebar-width: 260px;
    }

    [data-theme="dark"] {
      --bg: #090B10;
      --surface: #141C18;
      --text: #F0F5F2;
      --text-secondary: #8A9A92;
      --text-tertiary: #5A6B63;
      --border: #2A3B33;
      --glass-bg: rgba(20,28,24,0.72);
      --glass-border: rgba(255,255,255,0.08);
    }

    [dir="rtl"] body { font-family: 'Noto Sans Arabic', 'Inter', sans-serif; }

    /* ========================================
       Reset & Base
       ======================================== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    a { text-decoration: none; color: inherit; }
    button { font-family: inherit; cursor: pointer; }
    img { max-width: 100%; display: block; }

    /* ========================================
       Animations
       ======================================== */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-30px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(30px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(1.05); }
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .animate-fade-in { animation: fadeIn 0.5s ease forwards; }
    .animate-fade-up { animation: fadeInUp 0.6s ease forwards; }
    .animate-slide-left { animation: slideInLeft 0.5s ease forwards; }
    .animate-slide-right { animation: slideInRight 0.5s ease forwards; }
    .animate-scale { animation: scaleIn 0.4s ease forwards; }

    .delay-1 { animation-delay: 0.1s; opacity: 0; }
    .delay-2 { animation-delay: 0.2s; opacity: 0; }
    .delay-3 { animation-delay: 0.3s; opacity: 0; }
    .delay-4 { animation-delay: 0.4s; opacity: 0; }
    .delay-5 { animation-delay: 0.5s; opacity: 0; }

    /* ========================================
       Auth Screen (Login/Signup)
       ======================================== */
    .auth-screen {
      min-height: 100vh;
      display: flex;
      background: var(--bg);
      position: relative;
      overflow: hidden;
    }

    .auth-left {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      position: relative;
      z-index: 1;
    }

    .auth-right {
      flex: 1;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      position: relative;
      overflow: hidden;
    }

    .auth-right::before {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      background: rgba(255,255,255,0.1);
      border-radius: 50%;
      top: -100px;
      right: -100px;
      animation: float 6s ease-in-out infinite;
    }

    .auth-right::after {
      content: '';
      position: absolute;
      width: 300px;
      height: 300px;
      background: rgba(255,255,255,0.08);
      border-radius: 50%;
      bottom: -80px;
      left: -80px;
      animation: float 8s ease-in-out infinite reverse;
    }

    .auth-form-container {
      width: 100%;
      max-width: 400px;
    }

    .auth-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 40px;
    }

    .auth-logo-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(255,90,44,0.3);
    }

    .auth-title {
      font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 8px;
    }

    .auth-subtitle {
      color: var(--text-secondary);
      font-size: 15px;
      margin-bottom: 32px;
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-secondary);
    }

    .input-group input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      font-size: 14px;
      color: var(--text);
      background: var(--surface);
      transition: all 0.3s ease;
    }

    .input-group input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(255,90,44,0.1);
    }

    .input-group input::placeholder { color: var(--text-tertiary); }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: var(--radius);
      font-weight: 600;
      font-size: 14px;
      border: none;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .btn::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .btn:hover::after { opacity: 1; }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      box-shadow: 0 4px 16px rgba(255,90,44,0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(255,90,44,0.4);
    }

    .btn-primary:active { transform: translateY(0); }

    .btn-outline {
      background: transparent;
      color: var(--text);
      border: 2px solid var(--border);
    }

    .btn-outline:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-secondary);
    }

    .btn-ghost:hover { color: var(--text); background: rgba(0,0,0,0.05); }

    .btn-lg { padding: 16px 32px; font-size: 16px; border-radius: 14px; }
    .btn-full { width: 100%; }

    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      flex: 1;
    }

    .social-btn:hover {
      border-color: var(--primary);
      transform: translateY(-2px);
    }

    .auth-divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 24px 0;
      color: var(--text-tertiary);
      font-size: 13px;
    }

    .auth-divider::before, .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .auth-link {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: var(--text-secondary);
    }

    .auth-link a {
      color: var(--primary);
      font-weight: 600;
      transition: color 0.2s ease;
    }

    .auth-link a:hover { color: var(--primary-dark); }

    .auth-visual {
      position: relative;
      z-index: 1;
      text-align: center;
      color: white;
    }

    .auth-visual h2 {
      font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
      font-size: 36px;
      font-weight: 800;
      margin-bottom: 16px;
      line-height: 1.2;
    }

    .auth-visual p {
      font-size: 16px;
      opacity: 0.9;
      max-width: 400px;
      margin: 0 auto;
    }

    .auth-visual-mockup {
      width: 280px;
      height: 500px;
      background: rgba(0,0,0,0.2);
      border-radius: 32px;
      margin: 40px auto 0;
      padding: 12px;
      animation: float 6s ease-in-out infinite;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .mockup-inner {
      background: #0D1210;
      border-radius: 24px;
      height: 100%;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .mockup-header {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: white;
      font-weight: 600;
    }

    .mockup-greeting { font-size: 18px; font-weight: 700; color: white; }
    .mockup-search {
      background: rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 12px;
      color: #666;
      font-size: 12px;
    }

    .mockup-cats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .mockup-cat {
      text-align: center;
      padding: 10px 4px;
      background: rgba(255,255,255,0.04);
      border-radius: 10px;
    }
    .mockup-cat-icon { font-size: 20px; }
    .mockup-cat span { font-size: 9px; color: #888; display: block; margin-top: 4px; }

    .mockup-card {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 10px;
    }

    .mockup-card-img {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .mockup-card-info strong { font-size: 12px; color: white; display: block; }
    .mockup-card-info span { font-size: 10px; color: #888; }

    /* ========================================
       Dashboard Layout
       ======================================== */
    .dashboard-layout {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: var(--sidebar-width);
      background: var(--surface);
      border-right: 1px solid var(--border);
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      transition: all 0.3s ease;
      animation: slideInLeft 0.4s ease;
    }

    [dir="rtl"] .sidebar { left: auto; right: 0; border-right: none; border-left: 1px solid var(--border); }

    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .sidebar-nav { flex: 1; padding: 12px; overflow-y: auto; }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: var(--radius);
      color: var(--text-secondary);
      font-weight: 500;
      font-size: 14px;
      transition: all 0.2s ease;
      cursor: pointer;
      margin-bottom: 4px;
    }

    .nav-item:hover { background: rgba(0,0,0,0.05); color: var(--text); }
    .nav-item.active { background: rgba(255,90,44,0.1); color: var(--primary); font-weight: 600; }
    [data-theme="dark"] .nav-item:hover { background: rgba(255,255,255,0.05); }

    .sidebar-footer {
      padding: 16px;
      border-top: 1px solid var(--border);
    }

    .main-content {
      flex: 1;
      margin-left: var(--sidebar-width);
      padding: 24px;
      min-height: 100vh;
      animation: fadeIn 0.4s ease;
    }

    [dir="rtl"] .main-content { margin-left: 0; margin-right: var(--sidebar-width); }

    /* ========================================
       Dashboard Components
       ======================================== */
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }

    .page-title {
      font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
      transition: all 0.3s ease;
      animation: fadeInUp 0.5s ease forwards;
    }

    .card:hover {
      box-shadow: var(--shadow-md);
    }

    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      padding: 24px;
    }

    .search-box {
      position: relative;
      margin-bottom: 24px;
    }

    .search-box input {
      width: 100%;
      padding: 14px 16px 14px 44px;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      font-size: 14px;
      background: var(--surface);
      color: var(--text);
      transition: all 0.3s ease;
    }

    .search-box input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(255,90,44,0.1);
    }

    .search-box svg {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-tertiary);
    }

    .categories {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
      overflow-x: auto;
      padding-bottom: 8px;
    }

    .categories::-webkit-scrollbar { height: 4px; }
    .categories::-webkit-scrollbar-track { background: transparent; }
    .categories::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .category-chip {
      padding: 8px 16px;
      border-radius: 100px;
      border: 2px solid var(--border);
      background: var(--surface);
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .category-chip:hover { border-color: var(--primary); color: var(--primary); }
    .category-chip.active {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }

    .restaurant-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .restaurant-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s ease;
      animation: fadeInUp 0.5s ease forwards;
    }

    .restaurant-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
    }

    .restaurant-img {
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 56px;
      position: relative;
      overflow: hidden;
    }

    .restaurant-img::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 50%, rgba(0,0,0,0.1));
    }

    .restaurant-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 4px 10px;
      border-radius: 100px;
      background: rgba(0,0,0,0.6);
      color: white;
      font-size: 11px;
      font-weight: 600;
      backdrop-filter: blur(10px);
    }

    .restaurant-body { padding: 16px; }
    .restaurant-name { font-weight: 700; font-size: 16px; margin-bottom: 4px; }
    .restaurant-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .restaurant-meta span { display: flex; align-items: center; gap: 4px; }

    /* ========================================
       Menu Items
       ======================================== */
    .menu-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.2s ease;
      animation: fadeInUp 0.4s ease forwards;
    }

    .menu-item:hover {
      border-color: var(--primary);
      transform: translateX(4px);
    }

    [dir="rtl"] .menu-item:hover { transform: translateX(-4px); }

    .menu-item-img {
      width: 80px;
      height: 80px;
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      flex-shrink: 0;
    }

    .menu-item-info { flex: 1; }
    .menu-item-name { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
    .menu-item-desc { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; }
    .menu-item-price { font-weight: 700; color: var(--primary); font-size: 15px; }

    .add-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--primary);
      color: white;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }

    .add-btn:hover { transform: scale(1.1); box-shadow: 0 4px 12px rgba(255,90,44,0.3); }

    /* ========================================
       Cart
       ======================================== */
    .cart-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 12px;
      animation: fadeInUp 0.4s ease forwards;
    }

    .cart-item-img {
      width: 60px;
      height: 60px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      flex-shrink: 0;
    }

    .cart-item-info { flex: 1; }
    .cart-item-name { font-weight: 600; font-size: 14px; }
    .cart-item-price { font-size: 13px; color: var(--primary); font-weight: 600; }

    .qty-control {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .qty-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .qty-btn:hover { border-color: var(--primary); color: var(--primary); }

    /* ========================================
       Order Tracking
       ======================================== */
    .tracking-map {
      height: 400px;
      border-radius: var(--radius-lg);
      background: linear-gradient(135deg, rgba(255,90,44,0.1), rgba(139,92,246,0.1));
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .tracking-map::before {
      content: '';
      position: absolute;
      width: 200px;
      height: 200px;
      border: 2px dashed var(--primary);
      border-radius: 50%;
      opacity: 0.3;
      animation: pulse 2s infinite;
    }

    .status-timeline {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .status-step {
      display: flex;
      gap: 16px;
      animation: fadeInUp 0.4s ease forwards;
    }

    .status-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .status-icon.completed { background: var(--success); color: white; }
    .status-icon.active { background: var(--primary); color: white; animation: pulse 2s infinite; }
    .status-icon.pending { background: var(--border); color: var(--text-tertiary); }

    .status-info h4 { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
    .status-info p { font-size: 12px; color: var(--text-secondary); }

       Wallet Card
       ======================================== */
    .wallet-card {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: var(--radius-xl);
      padding: 32px;
      color: white;
      position: relative;
      overflow: hidden;
      animation: fadeInUp 0.5s ease;
    }

    .wallet-card::before {
      content: '';
      position: absolute;
      width: 200px;
      height: 200px;
      background: rgba(255,255,255,0.1);
      border-radius: 50%;
      top: -50px;
      right: -50px;
    }

    .wallet-card::after {
      content: '';
      position: absolute;
      width: 150px;
      height: 150px;
      background: rgba(255,255,255,0.08);
      border-radius: 50%;
      bottom: -40px;
      left: -40px;
    }

    .wallet-label { font-size: 14px; opacity: 0.8; margin-bottom: 8px; position: relative; z-index: 1; }

    /* ========================================
       Loyalty Tier
       ======================================== */
    .tier-progress {
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 12px;
    }

    .tier-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      border-radius: 4px;
      transition: width 1s ease;
    }

    /* ========================================
       Toast Notifications
       ======================================== */
    .toast-container {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 10000;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      padding: 14px 20px;
      border-radius: var(--radius);
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-lg);
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 10px;
      animation: slideInRight 0.3s ease;
      max-width: 400px;
    }

    .toast-success { border-left: 4px solid var(--success); }
    .toast-error { border-left: 4px solid var(--error); }

    /* ========================================
       Mobile Bottom Nav
       ======================================== */
    .mobile-bottom-nav {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      z-index: 200;
      padding: 8px 0;
      padding-bottom: max(8px, env(safe-area-inset-bottom));
    }

    .mobile-bottom-nav-inner {
      display: flex;
      justify-content: space-around;
      align-items: center;
      max-width: 500px;
      margin: 0 auto;
    }

    .mobile-nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      color: var(--text-tertiary);
      font-size: 10px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      border: none;
      background: none;
      text-decoration: none;
    }

    .mobile-nav-item svg { width: 22px; height: 22px; }
    .mobile-nav-item.active { color: var(--primary); }
    .mobile-nav-item:hover { color: var(--primary); }

    .mobile-top-bar {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      z-index: 150;
      padding: 0 16px;
      align-items: center;
      justify-content: space-between;
    }

    .mobile-top-bar .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 800;
      font-size: 18px;
    }

    .mobile-top-bar .logo-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .mobile-top-bar-actions {
      display: flex;
      gap: 8px;
    }

    .mobile-top-bar-actions button {
      width: 36px;

      display: flex;

    /* ========================================

       ======================================== */
    @media (max-width: 768px) {

    }

    @media (max-width: 480px) {
      .main-content { padding: 12px !important; padding-top: 68px !important; padding-bottom: 76px !important; }

      setTimeout(() => t.remove(), 4000);
    }

    setTimeout(() => {

      if (ls) { ls.style.opacity = '0'; setTimeout(() => ls.remove(), 300); }
    }, 5000);

    // Auth
    onAuthStateChanged(auth, async (user) => {
      currentUser = user;
      if (user) {
        try {
          const snap = await getDoc(doc(db, 'users', user.uid));
          userData = snap.exists() ? snap.data() : null;
        } catch (e) {
          console.warn('Failed to fetch user data:', e);
          userData = null;
        }
        renderDashboard();
      } else {
        renderAuth();
      }
      const ls = document.getElementById('loadingScreen');
      if (ls) { ls.style.opacity = '0'; setTimeout(() => ls.remove(), 300); }
    }, (error) => {
      console.error('Auth state error:', error);
      renderAuth();

            </button>
            <button class="mobile-nav-item" onclick="showPage('loyalty')" data-page="loyalty">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>
              Points
            </button>
            <button class="mobile-nav-item" onclick="showPage('profile')" data-page="profile">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              Profile
            </button>
          </div>
        </nav>
      `;
      showPage('home');
    }

    window.showPage = (page) => {
      currentPage = page;
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      document.querySelector(`.nav-item[onclick="showPage('${page}')"]`)?.classList.add('active');
      document.querySelectorAll('.mobile-nav-item').forEach(n => n.classList.remove('active'));
      document.querySelector(`.mobile-nav-item[data-page="${page}"]`)?.classList.add('active');
      renderPage(page);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    function renderPage(page) {
      const content = document.getElementById('pageContent');
      switch(page) {
        case 'home': content.innerHTML = renderHome(); break;
        case 'orders': content.innerHTML = renderOrders(); break;
        case 'anything': content.innerHTML = renderAnything(); break;
        case 'wallet': content.innerHTML = renderWallet(); break;
        case 'loyalty': content.innerHTML = renderLoyalty(); break;
        case 'subscription': content.innerHTML = renderSubscription(); break;
        case 'profile': content.innerHTML = renderProfile(); break;
        default: content.innerHTML = renderHome();
      }
    }

    function renderHome() {
      return `
        <div class="page-header animate-fade-up">
          <div>
            <h1 class="page-title">Good evening 👋</h1>
            <p style="color:var(--text-secondary);font-size:14px">What would you like to order?</p>
          </div>
        </div>
        <div class="search-box animate-fade-up delay-1">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <input type="text" placeholder="Search restaurants or food...">
        </div>
        <div class="categories animate-fade-up delay-2">
          <button class="category-chip active">🍔 Food</button>
          <button class="category-chip">🛒 Grocery</button>
          <button class="category-chip">💊 Pharmacy</button>
          <button class="category-chip">🛍️ Retail</button>
          <button class="category-chip">🌸 Specialty</button>
          <button class="category-chip">📦 Anything</button>
        </div>
        <h2 style="font-size:18px;font-weight:700;margin-bottom:16px" class="animate-fade-up delay-3">Nearby Restaurants</h2>
        <div class="restaurant-grid">
          ${renderRestaurant('Pizza House','🍕','linear-gradient(135deg,#FF5A2C,#FF8C42)','25-35 min','4.8','Italian','Free delivery')}
          ${renderRestaurant('Burger King','🍔','linear-gradient(135deg,#22C55E,#06B6D4)','15-25 min','4.6','American','')}
          ${renderRestaurant('Sushi Master','🍣','linear-gradient(135deg,#8B5CF6,#EC4899)','30-40 min','4.7','Japanese','')}
          ${renderRestaurant('Al-Shifa Pharmacy','💊','linear-gradient(135deg,#F59E0B,#EF4444)','20-30 min','4.9','Pharmacy','24/7')}
          ${renderRestaurant('Fresh Market','🛒','linear-gradient(135deg,#06B6D4,#3B82F6)','15-20 min','4.5','Grocery','')}
          ${renderRestaurant('Sweet Dreams','🧁','linear-gradient(135deg,#EC4899,#8B5CF6)','20-30 min','4.8','Desserts','')}
        </div>
      `;
    }

    function renderRestaurant(name, emoji, bg, time, rating, cat, badge) {
      return `
        <div class="restaurant-card" onclick="showPage('restaurant')">
          <div class="restaurant-img" style="background:${bg}">${emoji}${badge ? `<span class="restaurant-badge">${badge}</span>` : ''}</div>
          <div class="restaurant-body">
            <div class="restaurant-name">${name}</div>
            <div class="restaurant-meta">
              <span>${cat}</span><span>•</span><span>⏱️ ${time}</span><span>•</span><span>⭐ ${rating}</span>
            </div>
          </div>
        </div>
      `;
    }

    function renderOrders() {
      return `
        <div class="page-header animate-fade-up"><h1 class="page-title">My Orders</h1></div>
        <div style="display:flex;flex-direction:column;gap:16px">
          ${renderOrderCard('#4521','Pizza House','42,900 SYP','delivered','2 hours ago','🍕')}
          ${renderOrderCard('#4520','Burger King','18,500 SYP','delivering','On the way','🍔')}
          ${renderOrderCard('#4519','Al-Shifa Pharmacy','12,000 SYP','delivered','Yesterday','💊')}
        </div>
      `;
    }

    function renderOrderCard(id, restaurant, total, status, time, emoji) {
      const statusColors = { delivered: 'var(--success)', delivering: 'var(--primary)', pending: 'var(--warning)' };
      return `
        <div class="card" style="cursor:pointer">
          <div style="display:flex;justify-content:space-between;align-items:start">
            <div style="display:flex;gap:12px;align-items:center">
              <div style="width:48px;height:48px;border-radius:12px;background:rgba(255,90,44,0.1);display:flex;align-items:center;justify-content:center;font-size:24px">${emoji}</div>
              <div><div style="font-weight:700">${restaurant}</div><div style="font-size:13px;color:var(--text-secondary)">${id} • ${time}</div></div>
            </div>
            <span style="padding:4px 10px;border-radius:100px;font-size:11px;font-weight:600;background:${statusColors[status]}20;color:${statusColors[status]}">${status}</span>
          </div>
          <div style="margin-top:16px;display:flex;justify-content:space-between;align-items:center;padding-top:12px;border-top:1px solid var(--border)">
            <span style="font-weight:700;color:var(--primary)">${total}</span>
            <div style="display:flex;gap:8px">
              ${status === 'delivered' ? '<button class="btn btn-outline" style="font-size:12px;padding:6px 12px">Reorder</button>' : '<button class="btn btn-primary" style="font-size:12px;padding:6px 12px">Track</button>'}
            </div>
          </div>
        </div>
      `;
    }

    function renderAnything() {
      return `
        <div class="page-header animate-fade-up"><h1 class="page-title">Anything Delivery</h1></div>
        <div class="card animate-fade-up delay-1" style="text-align:center;padding:48px">
          <div style="font-size:64px;margin-bottom:16px">📦</div>
          <h2 style="font-size:24px;font-weight:800;margin-bottom:8px">Need something special?</h2>
          <p style="color:var(--text-secondary);margin-bottom:24px;max-width:400px;margin-left:auto;margin-right:auto">Pin a location on the map, describe what you need, and a driver will buy it and deliver it to you.</p>
          <button class="btn btn-primary btn-lg">Start Request</button>
        </div>
      `;
    }

    function renderWallet() {
      return `
        <div class="page-header animate-fade-up"><h1 class="page-title">Wallet</h1></div>
        <div class="wallet-card animate-fade-up delay-1">
          <div class="wallet-label">Available Balance</div>
          <div class="wallet-balance">${userData?.walletBalance?.toLocaleString() || '0'} SYP</div>
          <button class="btn btn-white" style="margin-top:16px;position:relative;z-index:1">Top Up</button>
        </div>
        <h3 style="font-size:16px;font-weight:700;margin:24px 0 16px" class="animate-fade-up delay-2">Recent Transactions</h3>
        <div style="display:flex;flex-direction:column;gap:12px">
          <div class="card" style="display:flex;justify-content:space-between;align-items:center;animation-delay:0.3s">
            <div><div style="font-weight:600">Top Up</div><div style="font-size:13px;color:var(--text-secondary)">Yesterday</div></div>
            <div style="font-weight:700;color:var(--success)">+30,000 SYP</div>
          </div>
          <div class="card" style="display:flex;justify-content:space-between;align-items:center;animation-delay:0.4s">
            <div><div style="font-weight:600">Order #4520</div><div style="font-size:13px;color:var(--text-secondary)">2 days ago</div></div>
            <div style="font-weight:700;color:var(--error)">-5,000 SYP</div>
          </div>
        </div>
      `;
    }

    function renderLoyalty() {
      const points = userData?.loyaltyPoints || 1250;
      const tier = userData?.loyaltyTier || 'bronze';
      const nextTier = tier === 'bronze' ? 'Silver' : tier === 'silver' ? 'Gold' : 'Platinum';
      const progress = tier === 'bronze' ? 60 : tier === 'silver' ? 30 : 100;
      return `
        <div class="page-header animate-fade-up"><h1 class="page-title">Points & Rewards</h1></div>
        <div class="card animate-fade-up delay-1" style="text-align:center">
          <div style="font-size:14px;color:var(--text-secondary)">Your Points</div>
          <div style="font-size:48px;font-weight:800;color:var(--primary);margin:8px 0">${points.toLocaleString()}</div>
          <div style="font-size:14px;color:var(--text-secondary);text-transform:capitalize">${tier} Tier • ${2000 - points} points to ${nextTier}</div>
          <div class="tier-progress"><div class="tier-fill" style="width:${progress}%"></div></div>
        </div>
        <h3 style="font-size:16px;font-weight:700;margin:24px 0 16px" class="animate-fade-up delay-2">Redeem Points</h3>
        <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:16px">
          <div class="card" style="text-align:center;cursor:pointer;animation-delay:0.3s"><div style="font-size:36px;margin-bottom:8px">🎁</div><div style="font-weight:600">500 Points</div><div style="font-size:13px;color:var(--text-secondary)">5,000 SYP Discount</div></div>
          <div class="card" style="text-align:center;cursor:pointer;animation-delay:0.4s"><div style="font-size:36px;margin-bottom:8px">🚀</div><div style="font-weight:600">300 Points</div><div style="font-size:13px;color:var(--text-secondary)">Free Delivery</div></div>
        </div>
      `;
    }

    function renderSubscription() {
      return `
        <div class="page-header animate-fade-up"><h1 class="page-title">Subscription</h1></div>
        <div class="card animate-fade-up delay-1" style="max-width:500px;text-align:center;padding:40px">
          <div style="font-size:56px;margin-bottom:16px">⭐</div>
          <h2 style="font-size:24px;font-weight:800;margin-bottom:8px">TayyebGo Plus</h2>
          <div style="font-size:40px;font-weight:800;color:var(--primary);margin:16px 0">4,999 <span style="font-size:16px;font-weight:500;color:var(--text-secondary)">SYP/mo</span></div>
          <ul style="text-align:left;margin:24px 0;list-style:none;display:flex;flex-direction:column;gap:12px">
            <li style="display:flex;align-items:center;gap:10px">✅ Free delivery on all orders</li>
            <li style="display:flex;align-items:center;gap:10px">✅ 3-15% discount on orders</li>
            <li style="display:flex;align-items:center;gap:10px">✅ Priority support</li>
            <li style="display:flex;align-items:center;gap:10px">✅ Exclusive deals</li>
          </ul>
          <button class="btn btn-primary btn-full btn-lg">Subscribe Now</button>
          <p style="font-size:12px;color:var(--text-secondary);margin-top:12px">Pay with Sham Cash. Admin verifies and activates.</p>
        </div>
      `;
    }

    function renderProfile() {
      const name = userData?.displayName || currentUser?.displayName || 'User';
      const email = currentUser?.email || '';
      return `
        <div class="page-header animate-fade-up"><h1 class="page-title">Profile</h1></div>
        <div class="card animate-fade-up delay-1" style="max-width:600px">
          <div style="display:flex;align-items:center;gap:16px;margin-bottom:24px">
            <div style="width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;color:white;font-size:28px;font-weight:700">${name.charAt(0).toUpperCase()}</div>
            <div><div style="font-size:20px;font-weight:700">${name}</div><div style="color:var(--text-secondary);font-size:14px">${email}</div></div>
          </div>
          <div class="input-group"><label>Full Name</label><input type="text" value="${name}"></div>
          <div class="input-group"><label>Email</label><input type="email" value="${email}"></div>
          <div class="input-group"><label>Phone</label><input type="tel" value="${userData?.phoneNumber || ''}" placeholder="+963 9XX XXX XXX"></div>
          <button class="btn btn-primary">Save Changes</button>
        </div>
      `;
    }
  </script>
</body>
</html>
