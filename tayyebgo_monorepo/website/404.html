<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — TayyebGo</title>
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .error-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 120px 24px; }
    .error-code { font-family: 'Plus Jakarta Sans', 'Inter', sans-serif; font-size: clamp(80px, 15vw, 160px); font-weight: 800; letter-spacing: -4px; background: linear-gradient(135deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1; }
    .error-title { font-size: 24px; font-weight: 700; margin: 16px 0 12px; }
    .error-desc { font-size: 16px; color: var(--text-secondary); max-width: 400px; margin: 0 auto 32px; line-height: 1.7; }
    .error-links { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  </style>
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="container nav-container">
      <a href="/" class="logo">
        <div class="logo-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 2L3 7v10l9 5 9-5V7l-9-5z" fill="white" opacity="0.9"/><path d="M12 2v20M3 7l9 5 9-5" stroke="white" stroke-width="1.5" fill="none"/></svg>
        </div>
        <span>TayyebGo</span>
      </a>
      <div class="nav-links">
        <a href="/">Home</a>
        <a href="/#features">Features</a>
        <a href="/#pricing">Pricing</a>
        <a href="help.html">Help</a>
      </div>
      <div class="nav-actions">
        <a href="https://tayyebgo-app.web.app/login" class="btn btn-ghost">Sign In</a>
        <a href="https://tayyebgo-app.web.app/signup" class="btn btn-primary">Get Started</a>
      </div>
    </div>
  </nav>

  <main class="error-page">
    <div>
      <div class="error-code">404</div>
      <h1 class="error-title">Page not found</h1>
      <p class="error-desc">The page you're looking for doesn't exist or has been moved.</p>
      <div class="error-links">
        <a href="/" class="btn btn-primary btn-lg">Go Home</a>
        <a href="help.html" class="btn btn-outline btn-lg">Get Help</a>
      </div>
    </div>
  </main>

  <button class="back-to-top" id="backToTop" aria-label="Back to top">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 15l-6-6-6 6"/></svg>
  </button>

  <div class="loading-screen" id="loadingScreen"><div class="loading-spinner"></div></div>

  <script>
    // Theme toggle
    const savedTheme = localStorage.getItem('tayyebgo-theme');
    if (savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);
    else if (window.matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.setAttribute('data-theme', 'dark');
    document.getElementById('themeToggle')?.addEventListener('click', () => {
      const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('tayyebgo-theme', next);
    });
    // Loading
    window.addEventListener('load', () => { setTimeout(() => { const el = document.getElementById('loadingScreen'); if(el) el.classList.add('hidden'); }, 300); });
    // Back to top
    const btt = document.getElementById('backToTop');
    if(btt) { window.addEventListener('scroll', () => { btt.classList.toggle('visible', window.scrollY > 300); }); btt.addEventListener('click', () => window.scrollTo({top:0,behavior:'smooth'})); }
  </script>
</body>
</html>
