<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TayyebGo</title>
  <link rel="icon" type="image/svg+xml" href="../assets/images/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--primary:#FF5A2C;--primary-dark:#E84A1E;--accent:#8B5CF6;--success:#22C55E;--warning:#F59E0B;--error:#EF4444;--info:#06B6D4;--bg:#090B10;--surface:#141C18;--surface-2:#1A2420;--text:#F0F5F2;--text-secondary:#8A9A92;--text-tertiary:#5A6B63;--border:#2A3B33;--radius:12px;--radius-lg:20px;--radius-xl:28px;--sidebar:260px}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
    
    /* Splash */
    .splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10000;transition:opacity 0.5s ease}
    .splash.hide{opacity:0;pointer-events:none}
    .splash-icon{width:72px;height:72px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:20px;display:flex;align-items:center;justify-content:center;animation:pulse 1.5s ease infinite;box-shadow:0 8px 32px rgba(255,90,44,0.4)}
    .splash-text{font-family:'Plus Jakarta Sans',sans-serif;font-size:24px;font-weight:800;color:white;margin-top:20px}
    .dots{display:flex;gap:6px;margin-top:20px}
    .dots span{width:8px;height:8px;border-radius:50%;background:var(--primary);animation:dotBounce 1.4s ease infinite}
    .dots span:nth-child(2){animation-delay:0.2s}
    .dots span:nth-child(3){animation-delay:0.4s}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
    @keyframes dotBounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
    
    /* Auth Screen */
    .auth-screen{display:none;min-height:100vh;align-items:center;justify-content:center;padding:20px;background:var(--bg)}
    .auth-screen.show{display:flex}
    .auth-card{width:100%;max-width:420px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:36px;animation:slideUp 0.4s ease}
    @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .auth-logo{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:28px}
    .auth-logo-icon{width:48px;height:48px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:14px;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(255,90,44,0.3)}
    .auth-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:24px;font-weight:800;text-align:center;margin-bottom:4px}
    .auth-sub{text-align:center;color:var(--text-secondary);font-size:14px;margin-bottom:24px}
    .tabs{display:flex;gap:4px;background:var(--bg);border-radius:var(--radius);padding:4px;margin-bottom:24px}
    .tab{flex:1;padding:10px;border-radius:8px;border:none;background:transparent;color:var(--text-secondary);font-weight:600;font-size:13px;cursor:pointer;transition:0.2s;font-family:inherit}
    .tab.active{background:var(--surface-2);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,0.2)}
    .fg{margin-bottom:16px}
    .fg label{display:block;font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:6px}
    .fg input{width:100%;padding:12px 14px;border:2px solid var(--border);border-radius:var(--radius);font-size:14px;color:var(--text);background:var(--bg);transition:0.2s;font-family:inherit}
    .fg input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(255,90,44,0.1)}
    .fg input::placeholder{color:var(--text-tertiary)}
    .form-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
    .remember{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-secondary);cursor:pointer}
    .remember input{accent-color:var(--primary)}
    .forgot{font-size:12px;color:var(--primary);text-decoration:none;font-weight:500}
    .btn{width:100%;padding:13px;border-radius:var(--radius);border:none;font-size:14px;font-weight:700;cursor:pointer;transition:0.2s;font-family:inherit}
    .btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:white;box-shadow:0 4px 16px rgba(255,90,44,0.3)}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(255,90,44,0.4)}
    .btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
    .divider{display:flex;align-items:center;gap:12px;margin:18px 0;color:var(--text-tertiary);font-size:12px}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
    .social-row{display:flex;gap:8px}
    .social-btn{flex:1;padding:10px;border:2px solid var(--border);border-radius:var(--radius);background:var(--bg);display:flex;align-items:center;justify-content:center;gap:6px;color:var(--text);font-weight:600;font-size:12px;cursor:pointer;transition:0.2s;font-family:inherit}
    .social-btn:hover{border-color:var(--primary)}
    .switch-link{text-align:center;margin-top:16px;font-size:13px;color:var(--text-secondary)}
    .switch-link a{color:var(--primary);font-weight:600;text-decoration:none}
    .test-box{margin-top:16px;padding:12px;background:var(--bg);border-radius:var(--radius);border:1px dashed var(--border)}
    .test-box h4{font-size:10px;font-weight:700;color:var(--text-secondary);margin-bottom:4px;text-transform:uppercase}
    .test-box p{font-size:10px;color:var(--text-tertiary);line-height:1.6}
    
    /* Dashboard */
    .dash{display:none;min-height:100vh}
    .dash.show{display:flex}
    .side{width:var(--sidebar);background:var(--surface);border-right:1px solid var(--border);position:fixed;top:0;left:0;bottom:0;z-index:100;display:flex;flex-direction:column;animation:slideRight 0.3s ease}
    [dir="rtl"] .side{left:auto;right:0;border-right:none;border-left:1px solid var(--border)}
    @keyframes slideRight{from{transform:translateX(-100%)}to{transform:translateX(0)}}
    .side-head{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
    .side-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;color:white}
    .side-brand{font-weight:800;font-size:16px}
    .side-nav{flex:1;padding:8px;overflow-y:auto}
    .side-foot{padding:12px;border-top:1px solid var(--border)}
    .nav-i{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--radius);color:var(--text-secondary);font-weight:500;font-size:13px;transition:0.2s;cursor:pointer;margin-bottom:2px}
    .nav-i:hover{background:rgba(255,255,255,0.05);color:var(--text)}
    .nav-i.on{background:rgba(255,90,44,0.1);color:var(--primary);font-weight:600}
    .main{flex:1;margin-left:var(--sidebar);padding:20px;min-height:100vh;animation:fadeIn 0.3s ease}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    [dir="rtl"] .main{margin-left:0;margin-right:var(--sidebar)}
    .pg-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
    .pg-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:24px;font-weight:800}
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px}
    .stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;text-align:center;animation:slideUp 0.4s ease}
    .stat-val{font-size:28px;font-weight:800;color:var(--primary)}
    .stat-lbl{font-size:11px;color:var(--text-secondary);margin-top:4px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:12px;animation:slideUp 0.4s ease}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
    .rest-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;cursor:pointer;transition:0.3s;animation:slideUp 0.4s ease}
    .rest-card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,0.3)}
    .rest-img{height:140px;display:flex;align-items:center;justify-content:center;font-size:48px}
    .rest-body{padding:14px}
    .rest-name{font-weight:700;font-size:15px;margin-bottom:2px}
    .rest-meta{font-size:12px;color:var(--text-secondary)}
    .menu-i{display:flex;align-items:center;gap:12px;padding:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;cursor:pointer;transition:0.2s}
    .menu-i:hover{border-color:var(--primary)}
    .menu-icon{width:64px;height:64px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0}
    .menu-info{flex:1}
    .menu-name{font-weight:600;font-size:14px}
    .menu-desc{font-size:12px;color:var(--text-secondary);margin:2px 0}
    .menu-price{font-weight:700;color:var(--primary)}
    .add-btn{width:32px;height:32px;border-radius:50%;background:var(--primary);color:white;border:none;font-size:16px;cursor:pointer;transition:0.2s}
    .add-btn:hover{transform:scale(1.1)}
    .cart-i{display:flex;align-items:center;gap:12px;padding:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px}
    .cart-info{flex:1}
    .cart-name{font-weight:600;font-size:13px}
    .cart-price{font-size:12px;color:var(--primary)}
    .qty{display:flex;align-items:center;gap:10px}
    .qty-btn{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:var(--bg);color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px}
    .order-i{padding:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px}
    .badge{display:inline-block;padding:3px 8px;border-radius:100px;font-size:10px;font-weight:600}
    .badge-s{background:rgba(34,197,94,0.15);color:var(--success)}
    .badge-p{background:rgba(255,90,44,0.15);color:var(--primary)}
    .badge-w{background:rgba(245,158,11,0.15);color:var(--warning)}
    .badge-i{background:rgba(6,182,212,0.15);color:var(--info)}
    .wallet{background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:var(--radius-xl);padding:28px;color:white;position:relative;overflow:hidden}
    .wallet::before{content:'';position:absolute;width:180px;height:180px;background:rgba(255,255,255,0.1);border-radius:50%;top:-40px;right:-40px}
    .wallet-val{font-size:40px;font-weight:800;position:relative;z-index:1}
    .wallet-lbl{font-size:13px;opacity:0.8;position:relative;z-index:1}
    .toggle{width:56px;height:28px;border-radius:14px;background:var(--border);position:relative;cursor:pointer;transition:0.3s}
    .toggle.on{background:var(--primary)}
    .toggle::after{content:'';position:absolute;width:22px;height:22px;border-radius:50%;background:white;top:3px;left:3px;transition:0.3s}
    .toggle.on::after{transform:translateX(28px)}
    .order-card{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius-xl);padding:20px;margin-bottom:12px;transition:0.3s}
    .order-card:hover{border-color:var(--primary)}
    .toast-box{position:fixed;top:20px;right:20px;z-index:10000;display:flex;flex-direction:column;gap:8px}
    .toast{padding:12px 18px;border-radius:var(--radius);background:var(--surface);border:1px solid var(--border);font-size:13px;font-weight:500;animation:slideIn 0.3s ease}
    .toast-ok{border-left:4px solid var(--success)}
    .toast-err{border-left:4px solid var(--error)}
    @keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
    @media(max-width:768px){.side{display:none}.main{margin-left:0;padding:16px}.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="splash" id="splash">
    <div class="splash-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none"><path d="M12 2L3 7v10l9 5 9-5V7l-9-5z" fill="white" opacity="0.9"/></svg></div>
    <div class="splash-text">TayyebGo</div>
    <div class="dots"><span></span><span></span><span></span></div>
  </div>
  
  <div class="auth-screen" id="authScreen">
    <div class="auth-card">
      <div class="auth-logo"><div class="auth-logo-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 2L3 7v10l9 5 9-5V7l-9-5z" fill="white" opacity="0.9"/></svg></div></div>
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-sub">Sign in to TayyebGo</p>
      <div class="tabs"><button class="tab active" id="tabLogin" onclick="showTab('login')">Sign In</button><button class="tab" id="tabSignup" onclick="showTab('signup')">Sign Up</button></div>
      <div id="loginForm">
        <form onsubmit="doLogin(event)">
          <div class="fg"><label>Email</label><input type="email" id="email" placeholder="you@example.com" required></div>
          <div class="fg"><label>Password</label><input type="password" id="password" placeholder="••••••••" required></div>
          <div class="form-row"><label class="remember"><input type="checkbox" id="rememberMe"> Remember me</label><a href="#" class="forgot" onclick="doForgot();return false">Forgot?</a></div>
          <button type="submit" class="btn btn-primary" id="loginBtn">Sign In</button>
        </form>
        <div class="divider">or</div>
        <div class="social-row">
          <button class="social-btn" onclick="doGoogle()"><svg width="16" height="16" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg> Google</button>
          <button class="social-btn" onclick="toast('Apple coming soon','err')">Apple</button>
        </div>
        <div class="switch-link">No account? <a href="#" onclick="showTab('signup');return false">Sign up</a></div>
        <div class="test-box"><h4>Demo</h4><p>admin / customer / driver / owner<br>@test.com — Password: test123</p></div>
      </div>
      <div id="signupForm" style="display:none">
        <form onsubmit="doSignup(event)">
          <div class="fg"><label>Name</label><input type="text" id="sName" placeholder="John Doe" required></div>
          <div class="fg"><label>Email</label><input type="email" id="sEmail" placeholder="you@example.com" required></div>
          <div class="fg"><label>Password</label><input type="password" id="sPass" placeholder="••••••••" required minlength="6"></div>
          <button type="submit" class="btn btn-primary">Create Account</button>
        </form>
        <div class="switch-link">Have account? <a href="#" onclick="showTab('login');return false">Sign in</a></div>
      </div>
    </div>
  </div>
  
  <div class="dash" id="dashScreen"></div>
  <div class="toast-box" id="toastBox"></div>

  <script type="module">
    import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import{getAuth,GoogleAuthProvider,signInWithEmailAndPassword,createUserWithEmailAndPassword,sendPasswordResetEmail,signInWithPopup,onAuthStateChanged,setPersistence,browserLocalPersistence,browserSessionPersistence}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
    import{getFirestore,doc,getDoc,setDoc,serverTimestamp,collection,getDocs,query,where,orderBy,updateDoc,addDoc,onSnapshot}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
    
    const cfg={apiKey:"AIzaSyBwVf76nVKlxpVloPRklEax7EjlXivZcK4",authDomain:"tayyebgo.firebaseapp.com",projectId:"tayyebgo",storageBucket:"tayyebgo.firebasestorage.app",messagingSenderId:"704530942839",appId:"1:704530942839:web:7e11271910bc913d6e2f72"};
    const app=initializeApp(cfg),auth=getAuth(app),db=getFirestore(app),gProvider=new GoogleAuthProvider();
    let user=null,uData=null,cart=[],isOnline=false,activeDelivery=null;
    
    function toast(m,t='ok'){const c=document.getElementById('toastBox'),d=document.createElement('div');d.className=`toast toast-${t==='err'?'err':'ok'}`;d.textContent=m;c.appendChild(d);setTimeout(()=>d.remove(),4000)}
    
    // Splash → Auth
    setTimeout(()=>{document.getElementById('splash').classList.add('hide');document.getElementById('authScreen').classList.add('show')},1200);
    
    // Auth state - with role detection from email
    onAuthStateChanged(auth,async(u)=>{
      if(u){
        user=u;
        console.log('User logged in:', u.email);
        
        // Get or create user document
        const s=await getDoc(doc(db,'users',u.uid));
        if(s.exists()){
          uData=s.data();
          console.log('User data from Firestore:', uData);
        }else{
          // Auto-detect role from email and create document
          let role='customer';
          if(u.email==='admin@test.com')role='admin';
          else if(u.email==='driver@test.com')role='driver';
          else if(u.email==='owner@test.com'||u.email==='cashier@test.com')role='partner';
          
          uData={uid:u.uid,email:u.email,role,displayName:u.email.split('@')[0],loyaltyPoints:0,walletBalance:0};
          await setDoc(doc(db,'users',u.uid),uData);
          console.log('Created user doc with role:', role);
        }
        
        document.getElementById('splash').classList.add('hide');
        document.getElementById('authScreen').classList.remove('show');
        document.getElementById('dashScreen').classList.add('show');
        renderDash();
      }else{
        document.getElementById('dashScreen').classList.remove('show');
        document.getElementById('authScreen').classList.add('show');
      }
    });
    
    // Auth functions
    window.showTab=t=>{document.getElementById('tabLogin').classList.toggle('active',t==='login');document.getElementById('tabSignup').classList.toggle('active',t==='signup');document.getElementById('loginForm').style.display=t==='login'?'block':'none';document.getElementById('signupForm').style.display=t==='signup'?'block':'none'};
    
    window.doLogin=async e=>{e.preventDefault();const b=document.getElementById('loginBtn');b.textContent='Signing in...';b.disabled=true;try{await setPersistence(auth,document.getElementById('rememberMe').checked?browserLocalPersistence:browserSessionPersistence);await signInWithEmailAndPassword(auth,document.getElementById('email').value,document.getElementById('password').value);toast('Welcome!')}catch(er){toast(errMsg(er.code),'err');b.textContent='Sign In';b.disabled=false}};
    
    window.doSignup=async e=>{e.preventDefault();try{const c=await createUserWithEmailAndPassword(auth,document.getElementById('sEmail').value,document.getElementById('sPass').value);await setDoc(doc(db,'users',c.user.uid),{uid:c.user.uid,email:c.user.email,displayName:document.getElementById('sName').value,role:'customer',loyaltyPoints:0,walletBalance:0,createdAt:serverTimestamp()});toast('Account created!')}catch(er){toast(errMsg(er.code),'err')}};
    
    window.doGoogle=async()=>{try{const r=await signInWithPopup(auth,gProvider);const s=await getDoc(doc(db,'users',r.user.uid));if(!s.exists())await setDoc(doc(db,'users',r.user.uid),{uid:r.user.uid,email:r.user.email,displayName:r.user.displayName||'User',role:'customer',loyaltyPoints:0,walletBalance:0,createdAt:serverTimestamp()});toast('Welcome!')}catch(er){toast(errMsg(er.code),'err')}};
    
    window.doForgot=async()=>{const e=prompt('Enter email:');if(e)try{await sendPasswordResetEmail(auth,e);toast('Reset link sent!')}catch(er){toast(errMsg(er.code),'err')}};
    
    function errMsg(c){return{'auth/user-not-found':'No account found','auth/wrong-password':'Wrong password','auth/invalid-email':'Invalid email','auth/email-already-in-use':'Email taken','auth/weak-password':'Min 6 characters'}[c]||'Error occurred'}
    
    // ============ DASHBOARD RENDERER ============
    window.renderDash=()=>{
      const role=uData?.role||'customer';
      const dash=document.getElementById('dashScreen');
      switch(role){
        case'admin':dash.innerHTML=renderAdmin();break;
        case'driver':dash.innerHTML=renderDriver();break;
        case'partner':case'owner':case'cashier':dash.innerHTML=renderPartner();break;
        default:dash.innerHTML=renderCustomer();
      }
    }
    
    // ============ CUSTOMER APP ============
    function renderCustomer(){
      return`<div class="dash-layout">
        <aside class="side">
          <div class="side-head"><div class="side-icon" style="background:linear-gradient(135deg,var(--primary),var(--accent))">🏠</div><span class="side-brand">TayyebGo</span></div>
          <nav class="side-nav">
            <div class="nav-i on" onclick="showCust('home')">🏠 Home</div>
            <div class="nav-i" onclick="showCust('orders')">📦 Orders</div>
            <div class="nav-i" onclick="showCust('tracking')">📍 Track</div>
            <div class="nav-i" onclick="showCust('cart')">🛒 Cart</div>
            <div class="nav-i" onclick="showCust('wallet')">💰 Wallet</div>
            <div class="nav-i" onclick="showCust('loyalty')">⭐ Points</div>

            <div class="nav-i" onclick="showAdmin('approvals')">✅ Approvals</div>
          </nav>
          <div class="side-foot"><button onclick="doLogout()" class="btn" style="background:var(--error);color:white;font-size:12px">Sign Out</button></div>
        </aside>
        <main class="main" id="adminContent"></main>
      </div>`;
    }
    
    window.showAdmin=async p=>{
      document.querySelectorAll('.nav-i').forEach(n=>n.classList.remove('on'));
      event?.target?.classList.add('on');
      const c=document.getElementById('adminContent');
      if(p==='home'){
        let users=[],orders=[];
        try{const s=await getDocs(collection(db,'users'));s.forEach(d=>users.push({id:d.id,...d.data()}))}catch(e){}
        try{const s=await getDocs(collection(db,'orders'));s.forEach(d=>orders.push({id:d.id,...d.data()}))}catch(e){}
        c.innerHTML=`<div class="pg-head"><h1 class="pg-title">Admin Dashboard</h1></div>
          <div class="stats">
            <div class="stat"><div class="stat-val">${users.filter(u=>u.role==='customer').length}</div><div class="stat-lbl">Customers</div></div>
            <div class="stat"><div class="stat-val">${users.filter(u=>u.role==='driver').length}</div><div class="stat-lbl">Drivers</div></div>
            <div class="stat"><div class="stat-val">${users.filter(u=>u.role==='partner'||u.role==='owner').length}</div><div class="stat-lbl">Partners</div></div>
            <div class="stat"><div class="stat-val">${orders.length}</div><div class="stat-lbl">Orders</div></div>
            <div class="stat"><div class="stat-val">${(orders.reduce((s,o)=>s+(o.total||0),0)/1000000).toFixed(1)}M</div><div class="stat-lbl">Revenue SYP</div></div>
          </div>
          <h3 style="margin-bottom:12px">Recent Orders</h3>
          ${orders.slice(0,10).map(o=>`<div class="order-i"><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-weight:700">#${o.id?.slice(0,8)}</div><div style="font-size:12px;color:var(--text-secondary)">${o.restaurantName||'Order'}</div></div><span class="badge badge-p">${o.status}</span></div></div>`).join('')||'<div class="card" style="text-align:center;padding:40px"><div style="font-size:48px">📦</div><div style="color:var(--text-secondary)">No orders</div></div>'}</div>`;
      }else if(p==='users'){
        let users=[];try{const s=await getDocs(collection(db,'users'));s.forEach(d=>users.push({id:d.id,...d.data()}))}catch(e){}
        c.innerHTML=`<div class="pg-head"><h1 class="pg-title">Users (${users.length})</h1></div>${users.map(u=>`<div class="card" style="display:flex;justify-content:space-between;align-items:center"><div style="display:flex;gap:10px;align-items:center"><div style="width:36px;height:36px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;color:white;font-size:14px;font-weight:700">${(u.displayName||'U').charAt(0)}</div><div><div style="font-weight:600">${u.displayName||'User'}</div><div style="font-size:12px;color:var(--text-secondary)">${u.email}</div></div></div><span class="badge badge-s">${u.role}</span></div>`).join('')||'<div class="card" style="text-align:center;padding:40px"><div style="font-size:48px">👥</div><div style="color:var(--text-secondary)">No users</div></div>'}</div>`;
      }else if(p==='orders'){
        let orders=[];try{const s=await getDocs(collection(db,'orders'));s.forEach(d=>orders.push({id:d.id,...d.data()}))}catch(e){}
        c.innerHTML=`<div class="pg-head"><h1 class="pg-title">All Orders (${orders.length})</h1></div>${orders.map(o=>`<div class="order-i"><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-weight:700">#${o.id?.slice(0,8)}</div><div style="font-size:12px;color:var(--text-secondary)">${o.restaurantName||'Order'} • ${(o.total||0).toLocaleString()} SYP</div></div><span class="badge badge-p">${o.status}</span></div></div>`).join('')||'<div class="card" style="text-align:center;padding:40px"><div style="font-size:48px">📦</div><div style="color:var(--text-secondary)">No orders</div></div>'}</div>`;
      }else if(p==='stores'){
        let rests=[];try{const s=await getDocs(collection(db,'restaurants'));s.forEach(d=>rests.push({id:d.id,...d.data()}))}catch(e){}
        c.innerHTML=`<div class="pg-head"><h1 class="pg-title">Stores (${rests.length})</h1><button class="btn" style="background:var(--primary);color:white;padding:8px 16px;font-size:12px" onclick="showCreateStore()">+ Create</button></div>${rests.map(r=>`<div class="card" style="display:flex;justify-content:space-between;align-items:center"><div style="display:flex;gap:10px;align-items:center"><div style="width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,#F59E0B,#D97706);display:flex;align-items:center;justify-content:center;font-size:18px">🏪</div><div><div style="font-weight:600">${r.name||'Store'}</div><div style="font-size:12px;color:var(--text-secondary)">${r.category||'Restaurant'}</div></div></div><span class="badge badge-s">${r.isActive?'Active':'Inactive'}</span></div>`).join('')||'<div class="card" style="text-align:center;padding:40px"><div style="font-size:48px">🏪</div><div style="color:var(--text-secondary)">No stores</div></div>'}</div>`;
      }else if(p==='finance'){
        let orders=[];try{const s=await getDocs(collection(db,'orders'));s.forEach(d=>orders.push({id:d.id,...d.data()}))}catch(e){}
        const rev=orders.reduce((s,o)=>s+(o.total||0),0);
        c.innerHTML=`<div class="pg-head"><h1 class="pg-title">Finance</h1></div><div class="wallet"><div class="wallet-lbl">Total Revenue</div><div class="wallet-val">${(rev/1000000).toFixed(1)}M SYP</div></div><div class="card" style="margin-top:16px"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><span>Commission (15%)</span><span style="font-weight:700;color:var(--primary)">${(rev*0.15/1000000).toFixed(1)}M SYP</span></div></div>`;
      }else if(p==='approvals'){
        let subs=[];try{const s=await getDocs(collection(db,'subscriptions'));s.forEach(d=>subs.push({id:d.id,...d.data()}))}catch(e){}
        c.innerHTML=`<div class="pg-head"><h1 class="pg-title">Approvals (${subs.length})</h1></div>${subs.map(s=>`<div class="card" style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-weight:700">${s.userName||'User'}</div><div style="font-size:12px;color:var(--text-secondary)">${s.plan} • ${(s.amount||0).toLocaleString()} SYP</div></div>${s.status==='pending'?`<button class="btn" style="background:var(--primary);color:white;padding:8px 16px;font-size:12px" onclick="approveSub('${s.id}','${s.userId}')">Approve</button>`:`<span class="badge badge-s">${s.status}</span>`}</div>`).join('')||'<div class="card" style="text-align:center;padding:40px"><div style="font-size:48px">✅</div><div style="color:var(--text-secondary)">No pending approvals</div></div>'}</div>`;
      }
    }
    
    window.showCreateStore=()=>{
      const c=document.getElementById('adminContent');
      if(!c)return;
      c.innerHTML=`<div class="pg-head"><h1 class="pg-title">Create Store</h1></div><div class="card"><div class="fg"><label>Store Name *</label><input id="storeName" placeholder="Pizza House"></div><div class="fg"><label>Category *</label><select id="storeCat"><option value="food">Food</option><option value="grocery">Grocery</option><option value="pharmacy">Pharmacy</option></select></div><div class="fg"><label>Owner Email</label><input id="storeEmail" placeholder="owner@example.com"></div><div class="fg"><label>Delivery Fee (SYP)</label><input id="storeFee" type="number" value="3000"></div><div style="display:flex;gap:8px"><button class="btn" style="background:var(--surface);border:1px solid var(--border);color:var(--text);flex:1" onclick="showAdmin('stores')">Cancel</button><button class="btn" style="background:var(--primary);color:white;flex:1" onclick="createStore()">Create</button></div></div>`;
    }
    
    window.createStore=async()=>{
      const name=document.getElementById('storeName')?.value;
      const cat=document.getElementById('storeCat')?.value;
      if(!name||!cat)return toast('Fill required fields','err');
      try{await addDoc(collection(db,'restaurants'),{name,category:cat,ownerEmail:document.getElementById('storeEmail')?.value||'',deliveryFee:parseInt(document.getElementById('storeFee')?.value)||3000,rating:0,isActive:true,createdAt:new Date(),createdBy:user.uid});toast('Store created!');showAdmin('stores')}catch(e){toast('Error','err')}
    };
    
    window.approveSub=async(id,uid)=>{try{await updateDoc(doc(db,'subscriptions',id),{status:'active'});await updateDoc(doc(db,'users',uid),{subscriptionStatus:'active'});toast('Approved!');showAdmin('approvals')}catch(e){toast('Error','err')}};
    
    window.doLogout=async()=>{try{await signOut(auth);toast('Signed out')}catch(e){toast('Error','err')}};
  </script>
</body>
</html>
