<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TayyebGo — Admin Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="../../assets/images/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Noto+Sans+Arabic:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <style>:root{--primary:#5263F3;--primary-dark:#4338CA;--primary-light:#818CF8}[data-theme="dark"]{--primary:#5263F3;--primary-dark:#4338CA}</style>
</head>
<body>
  <div id="app"><div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)"><div style="text-align:center"><div style="width:48px;height:48px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px"></div><p style="color:var(--text-secondary);font-size:14px">Loading...</p></div></div>
  <div class="toast-container" id="toastContainer"></div>
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
    import { getFirestore, doc, getDoc, collection, getDocs, query, orderBy, limit, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
    
    const firebaseConfig={apiKey:"AIzaSyBwVf76nVKlxpVloPRklEax7EjlXivZcK4",authDomain:"tayyebgo.firebaseapp.com",projectId:"tayyebgo",storageBucket:"tayyebgo.firebasestorage.app",messagingSenderId:"704530942839",appId:"1:704530942839:web:7e11271910bc913d6e2f72"};
    const fbApp=initializeApp(firebaseConfig);const auth=getAuth(fbApp);const db=getFirestore(fbApp);
    
    let currentUser=null;let userData=null;
    let stats={customers:0,drivers:0,partners:0,orders:0,revenue:0,approvals:0};
    let recentOrders=[];let allUsers=[];let allOrders=[];
    
    function showToast(msg,type='success'){const c=document.getElementById('toastContainer');const t=document.createElement('div');t.className=`toast toast-${type}`;t.textContent=msg;c.appendChild(t);setTimeout(()=>t.remove(),4000);}
    
    // Auth check
    onAuthStateChanged(auth,async(user)=>{
      currentUser=user;
      if(user){
        const snap=await getDoc(doc(db,'users',user.uid));
        userData=snap.exists()?snap.data():null;
        if(userData&&userData.role!=='admin'){
          showToast('Not an admin account','error');
          await signOut(auth);
          return;
        }
        await loadAllData();
        renderDashboard();
      } else {
        window.location.href='../';
      }
    });
    
    // Load all data from Firestore
    async function loadAllData(){
      try {
        // Load users
        const usersSnap = await getDocs(collection(db,'users'));
        allUsers = [];
        usersSnap.forEach(doc => {
          allUsers.push({id:doc.id,...doc.data()});
        });
        stats.customers = allUsers.filter(u=>u.role==='customer').length;
        stats.drivers = allUsers.filter(u=>u.role==='driver').length;
        stats.partners = allUsers.filter(u=>u.role==='partner'||u.role==='owner').length;
        
        // Load orders
        const ordersSnap = await getDocs(query(collection(db,'orders'),orderBy('createdAt','desc'),limit(50)));
        recentOrders = [];
        ordersSnap.forEach(doc => {
          recentOrders.push({id:doc.id,...doc.data()});
        });
        stats.orders = recentOrders.length;
        stats.revenue = recentOrders.reduce((sum,o)=>sum+(o.total||0),0);
        
        // Load approvals
        const approvalsSnap = await getDocs(collection(db,'approvals'));
        stats.approvals = approvalsSnap.size;
        
      } catch(e) {
        console.log('Data load error:',e);
      }
    }
    
    // Render dashboard
    function renderDashboard(){
      const name=userData?.displayName||'Admin';
      const letter=name.charAt(0).toUpperCase();
      document.getElementById('app').innerHTML=`<div class="dashboard-layout">
        <aside class="sidebar">
          <div class="sidebar-header">
            <div style="width:36px;height:36px;background:linear-gradient(135deg,var(--primary),#4338CA);border-radius:10px;display:flex;align-items:center;justify-content:center">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 2L3 7v10l9 5 9-5V7l-9-5z" fill="white" opacity="0.9"/></svg>
            </div>
            <span style="font-weight:800;font-size:18px">Admin</span>
          </div>
          <nav class="sidebar-nav">
            <div class="nav-item active" onclick="showPage('dashboard')">🏠 Dashboard</div>
            <div class="nav-item" onclick="showPage('customers')">👥 Customers (${stats.customers})</div>
            <div class="nav-item" onclick="showPage('drivers')">🚗 Drivers (${stats.drivers})</div>
            <div class="nav-item" onclick="showPage('partners')">🏪 Partners (${stats.partners})</div>
            <div class="nav-item" onclick="showPage('orders')">📦 Orders (${stats.orders})</div>
            <div class="nav-item" onclick="showPage('finance')">💰 Finance</div>
            <div class="nav-item" onclick="showPage('approvals')">✅ Approvals (${stats.approvals})</div>
            <div class="nav-item" onclick="showPage('subscriptions')">🎫 Subscriptions</div>
            <div class="nav-item" onclick="showPage('settings')">⚙️ Settings</div>
          </nav>
          <div class="sidebar-footer">
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
              <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--primary),#4338CA);display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:14px">${letter}</div>
              <div style="flex:1"><div style="font-weight:600;font-size:13px">${name}</div><div style="font-size:11px;color:var(--text-secondary)">Admin</div></div>
            </div>
            <button onclick="doLogout()" class="btn btn-ghost btn-full" style="color:var(--error);font-size:13px">🚪 Sign Out</button>
          </div>
        </aside>
        <main class="main-content" id="pageContent"></main>
      </div>`;
      showPage('dashboard');
    }
    
    // Page navigation
    window.showPage=(page)=>{
      document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
      document.querySelector(`.nav-item[onclick="showPage('${page}')"]`)?.classList.add('active');
      const c=document.getElementById('pageContent');
      switch(page){
        case 'dashboard':c.innerHTML=renderDashboardPage();break;
        case 'customers':c.innerHTML=renderCustomers();break;
        case 'drivers':c.innerHTML=renderDrivers();break;
        case 'partners':c.innerHTML=renderPartners();break;
        case 'orders':c.innerHTML=renderOrders();break;
        case 'finance':c.innerHTML=renderFinance();break;
        case 'approvals':c.innerHTML=renderApprovals();break;
        case 'create-store':c.innerHTML=renderCreateStore();break;
        case 'subscriptions':c.innerHTML=renderSubscriptions();break;
        default:c.innerHTML=renderDashboardPage();
      }
    };
    
    window.doLogout=async()=>{await signOut(auth);showToast('Signed out');window.location.href='../';};
    
    // Dashboard page with REAL data
    function renderDashboardPage(){
      const recentOrdersHtml = recentOrders.slice(0,10).map(o=>{
        const statusColors={delivered:'var(--success)',delivering:'var(--primary)',pending:'var(--warning)',accepted:'var(--info)',cancelled:'var(--error)'};
        const customer = allUsers.find(u=>u.id===o.customerId);
        return `<div class="card" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <div style="display:flex;gap:12px;align-items:center">
            <div style="width:40px;height:40px;border-radius:10px;background:rgba(82,99,243,0.1);display:flex;align-items:center;justify-content:center;font-size:18px">📦</div>
            <div>
              <div style="font-weight:600;font-size:14px">#${o.id?.slice(0,8)||'N/A'}</div>
              <div style="font-size:12px;color:var(--text-secondary)">${customer?.displayName||'Customer'} • ${o.restaurantName||'Store'}</div>
            </div>
          </div>
          <div style="display:flex;gap:10px;align-items:center">
            <span style="padding:4px 10px;border-radius:100px;font-size:11px;font-weight:600;background:${statusColors[o.status]||'var(--text-tertiary)'}20;color:${statusColors[o.status]||'var(--text-tertiary)'}">${o.status||'unknown'}</span>
            <div style="font-weight:700;color:var(--primary);font-size:14px">${(o.total||0).toLocaleString()} SYP</div>
          </div>
        </div>`;
      }).join('');
      
      return `<div class="page-header animate-fade-up">
        <div><h1 class="page-title">Admin Dashboard</h1><p style="color:var(--text-secondary);font-size:14px">Platform overview • Last updated: ${new Date().toLocaleTimeString()}</p></div>
        <button class="btn btn-outline btn-sm" onclick="loadAllData().then(()=>showPage('dashboard'))">🔄 Refresh</button>
      </div>
      <div class="stats-grid">
        <div class="stat-card animate-fade-up delay-2"><div class="stat-value">${stats.customers}</div><div class="stat-label">Total Customers</div></div>
        <div class="stat-card animate-fade-up delay-3"><div class="stat-value">${stats.drivers}</div><div class="stat-label">Active Drivers</div></div>
        <div class="stat-card" style="animation-delay:0.4s"><div class="stat-value">${stats.partners}</div><div class="stat-label">Partner Stores</div></div>
      </div>
      <div class="stats-grid">
        <div class="stat-card animate-fade-up delay-2"><div class="stat-value">${stats.orders}</div><div class="stat-label">Total Orders</div></div>
        <div class="stat-card animate-fade-up delay-3"><div class="stat-value">${(stats.revenue/1000000).toFixed(1)}M</div><div class="stat-label">Revenue (SYP)</div></div>
        <div class="stat-card" style="animation-delay:0.4s"><div class="stat-value">${stats.approvals}</div><div class="stat-label">Pending Approvals</div></div>
      </div>
      <h2 style="font-size:18px;font-weight:700;margin:24px 0 16px" class="animate-fade-up delay-3">Recent Orders</h2>
      ${recentOrdersHtml || '<div class="card" style="text-align:center;padding:40px"><div style="font-size:48px;margin-bottom:12px">📦</div><div style="color:var(--text-secondary)">No orders yet</div></div>'}
    `;
    }
    
    // Customers page with REAL data
    function renderCustomers(){
      const customers = allUsers.filter(u=>u.role==='customer');
      const customersHtml = customers.map(u=>userCard(u.displayName||'User',u.email||'No email','customer','Active')).join('');
      return `<div class="page-header animate-fade-up"><h1 class="page-title">Customers (${customers.length})</h1></div>
      <div class="search-box animate-fade-up delay-1">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" placeholder="Search customers..." oninput="filterUsers(this.value,'customer')">
      </div>
      <div id="usersList" style="display:flex;flex-direction:column;gap:12px">${customersHtml||'<div class="card" style="text-align:center;padding:40px"><div style="font-size:48px;margin-bottom:12px">👥</div><div style="color:var(--text-secondary)">No customers yet</div></div>'}</div>`;
    }
    
    // Drivers page with REAL data
    function renderDrivers(){
      const drivers = allUsers.filter(u=>u.role==='driver');
      const driversHtml = drivers.map(u=>userCard(u.displayName||'Driver',u.email||'No email','driver',u.isOnline?'Online':'Offline')).join('');
      return `<div class="page-header animate-fade-up"><h1 class="page-title">Drivers (${drivers.length})</h1></div>
      <div class="search-box animate-fade-up delay-1">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" placeholder="Search drivers..." oninput="filterUsers(this.value,'driver')">
      </div>
      <div id="usersList" style="display:flex;flex-direction:column;gap:12px">${driversHtml||'<div class="card" style="text-align:center;padding:40px"><div style="font-size:48px;margin-bottom:12px">🚗</div><div style="color:var(--text-secondary)">No drivers yet</div></div>'}</div>`;
    }
    
    // Partners page with REAL data
    function renderPartners(){
      const partners = allUsers.filter(u=>u.role==='partner'||u.role==='owner');
      const partnersHtml = partners.map(u=>userCard(u.displayName||'Partner',u.email||'No email','partner','Active')).join('');
      return `<div class="page-header animate-fade-up">
        <h1 class="page-title">Partners (${partners.length})</h1>
        <button class="btn btn-primary" onclick="showPage('create-store')">+ Create Store</button>
      </div>
      <div class="search-box animate-fade-up delay-1">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" placeholder="Search partners..." oninput="filterUsers(this.value,'partner')">
      </div>
      <div id="usersList" style="display:flex;flex-direction:column;gap:12px">${partnersHtml||'<div class="card" style="text-align:center;padding:40px"><div style="font-size:48px;margin-bottom:12px">🏪</div><div style="color:var(--text-secondary)">No partners yet</div></div>'}</div>`;
    }
    
    // Orders page with REAL data
    function renderOrders(){
      const ordersHtml = recentOrders.map(o=>{
        const statusColors={delivered:'var(--success)',delivering:'var(--primary)',pending:'var(--warning)',accepted:'var(--info)',cancelled:'var(--error)'};
        return `<div class="card" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <div style="display:flex;gap:12px;align-items:center">
            <div style="width:40px;height:40px;border-radius:10px;background:rgba(82,99,243,0.1);display:flex;align-items:center;justify-content:center;font-size:18px">📦</div>
            <div>
              <div style="font-weight:600;font-size:14px">#${o.id?.slice(0,8)||'N/A'}</div>
              <div style="font-size:12px;color:var(--text-secondary)">${o.restaurantName||'Store'} • ${o.createdAt?.toDate?.()? new Date(o.createdAt.toDate()).toLocaleDateString():'Recent'}</div>
            </div>
          </div>
          <div style="display:flex;gap:10px;align-items:center">
            <span style="padding:4px 10px;border-radius:100px;font-size:11px;font-weight:600;background:${statusColors[o.status]||'var(--text-tertiary)'}20;color:${statusColors[o.status]||'var(--text-tertiary)'}">${o.status||'unknown'}</span>
            <div style="font-weight:700;color:var(--primary);font-size:14px">${(o.total||0).toLocaleString()} SYP</div>
          </div>
        </div>`;
      }).join('');
      return `<div class="page-header animate-fade-up"><h1 class="page-title">All Orders (${stats.orders})</h1></div>
      <div class="categories" style="margin-bottom:24px">
        <button class="category-chip active">All</button>
        <button class="category-chip">Pending</button>
        <button class="category-chip">Delivering</button>
        <button class="category-chip">Delivered</button>
      </div>
      ${ordersHtml||'<div class="card" style="text-align:center;padding:40px"><div style="font-size:48px;margin-bottom:12px">📦</div><div style="color:var(--text-secondary)">No orders yet</div></div>'}`;
    }
    
    // Finance page with REAL data
    function renderFinance(){
      const thisMonth = recentOrders.filter(o=>{
        const d = o.createdAt?.toDate?.();
        if(!d) return false;
        const now = new Date();
        return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
      });
      const thisMonthRevenue = thisMonth.reduce((s,o)=>s+(o.total||0),0);
      const thisMonthOrders = thisMonth.length;
      const commission = Math.round(thisMonthRevenue * 0.15);
      
      return `<div class="page-header animate-fade-up"><h1 class="page-title">Finance</h1></div>
      <div class="wallet-card animate-fade-up delay-1" style="background:linear-gradient(135deg,var(--primary),#4338CA)">
        <div class="wallet-label">Total Revenue (All Time)</div>
        <div class="wallet-balance">${(stats.revenue/1000000).toFixed(1)}M SYP</div>
      </div>
      <h3 style="font-size:16px;font-weight:700;margin:24px 0 16px" class="animate-fade-up delay-2">This Month</h3>
      <div style="display:flex;flex-direction:column;gap:12px">
        <div class="card" style="display:flex;justify-content:space-between;align-items:center">
          <div><div style="font-weight:600">Orders</div><div style="font-size:13px;color:var(--text-secondary)">Completed this month</div></div>
          <div style="font-weight:700;color:var(--primary)">${thisMonthOrders}</div>
        </div>
        <div class="card" style="display:flex;justify-content:space-between;align-items:center">
          <div><div style="font-weight:600">Revenue</div><div style="font-size:13px;color:var(--text-secondary)">Total sales</div></div>
          <div style="font-weight:700;color:var(--primary)">${thisMonthRevenue.toLocaleString()} SYP</div>
        </div>
        <div class="card" style="display:flex;justify-content:space-between;align-items:center">
          <div><div style="font-weight:600">Commission (15%)</div><div style="font-size:13px;color:var(--text-secondary)">Platform earnings</div></div>
          <div style="font-weight:700;color:var(--success)">${commission.toLocaleString()} SYP</div>
        </div>
      </div>`;
    }
    
    // Approvals page with REAL data
    function renderApprovals(){
      const approvalsSnap = await getDocs(collection(db,'approvals'));
      const approvals = [];
      approvalsSnap.forEach(doc => approvals.push({id:doc.id,...doc.data()}));
      
      const approvalsHtml = approvals.map(a=>`
        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:start">
            <div>
              <div style="font-weight:700;font-size:16px">${a.type||'Application'}</div>
              <div style="font-size:14px;color:var(--text-secondary);margin-top:4px">${a.name||a.email||'Unknown'}</div>
            </div>
            <span style="padding:4px 10px;border-radius:100px;font-size:11px;font-weight:600;background:rgba(245,158,11,0.1);color:var(--warning)">${a.status||'Pending'}</span>
          </div>
          <div style="display:flex;gap:10px;margin-top:16px">
            <button class="btn btn-outline" style="flex:1" onclick="handleApproval('${a.id}','rejected')">Reject</button>
            <button class="btn btn-primary" style="flex:1" onclick="handleApproval('${a.id}','approved')">Approve</button>
          </div>
        </div>
      `).join('');
      
      return `<div class="page-header animate-fade-up"><h1 class="page-title">Approvals (${approvals.length})</h1></div>
      ${approvalsHtml||'<div class="card" style="text-align:center;padding:40px"><div style="font-size:48px;margin-bottom:12px">✅</div><div style="color:var(--text-secondary)">No pending approvals</div></div>'}`;
    }
    
    // Handle approval
    window.handleApproval = async (id, status) => {
      try {
        const { updateDoc } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
        await updateDoc(doc(db,'approvals',id),{status,updatedAt:new Date()});
        showToast(`Application ${status}!`);
        showPage('approvals');
      } catch(e) {
        showToast('Error: '+e.message,'error');
      }
    };
    
    // Create Store page
    function renderCreateStore(){
      return `<div class="page-header animate-fade-up">
        <div style="display:flex;align-items:center;gap:12px">
          <button onclick="showPage('partners')" class="btn btn-ghost btn-sm" style="font-size:12px">← Back</button>
          <h1 class="page-title" style="margin:0">Create New Store</h1>
        </div>
      </div>
      <div class="card animate-fade-up delay-1" style="max-width:600px">
        <h3 style="font-size:18px;font-weight:700;margin-bottom:24px">Store Information</h3>
        <div class="input-group">
          <label>Store Name *</label>
          <input type="text" id="storeName" placeholder="e.g. Pizza House">
        </div>
        <div class="input-group">
          <label>Category *</label>
          <select id="storeCategory">
            <option value="">Select category</option>
            <option value="food">Food/Restaurant</option>
            <option value="grocery">Grocery</option>
            <option value="pharmacy">Pharmacy</option>
            <option value="retail">Retail</option>
          </select>
        </div>
        <div class="input-group">
          <label>Owner Email *</label>
          <input type="email" id="storeOwnerEmail" placeholder="owner@example.com">
        </div>
        <div class="input-group">
          <label>Phone</label>
          <input type="tel" id="storePhone" placeholder="+963 XX XXX XXXX">
        </div>
        <div class="input-group">
          <label>Address</label>
          <input type="text" id="storeAddress" placeholder="Full address">
        </div>
        <div class="input-group">
          <label>Delivery Fee (SYP)</label>
          <input type="number" id="storeDeliveryFee" placeholder="3000" value="3000">
        </div>
        <button class="btn btn-primary btn-full btn-lg" onclick="createStore()" style="margin-top:16px">Create Store</button>
      </div>
    `;
    }
    
    window.createStore = async () => {
      const name = document.getElementById('storeName').value;
      const category = document.getElementById('storeCategory').value;
      const ownerEmail = document.getElementById('storeOwnerEmail').value;
      const phone = document.getElementById('storePhone').value;
      const address = document.getElementById('storeAddress').value;
      const deliveryFee = parseInt(document.getElementById('storeDeliveryFee').value) || 3000;
      
      if(!name || !category || !ownerEmail) {
        showToast('Please fill in required fields','error');
        return;
      }
      
      try {
        const {addDoc, collection} = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
        await addDoc(collection(db,'restaurants'),{
          name: name,
          category: category,
          ownerEmail: ownerEmail,
          phone: phone,
          address: address,
          deliveryFee: deliveryFee,
          rating: 0,
          totalOrders: 0,
          isActive: true,
          createdAt: new Date(),
          createdBy: currentUser.uid
        });
        showToast('Store created successfully!');
        await loadAllData();
        showPage('partners');
      } catch(e) {
        showToast('Error: '+e.message,'error');
      }
    };
    
    // Subscriptions page
    async function renderSubscriptions(){
      const subsSnap = await getDocs(collection(db,'subscriptions'));
      const subs = [];
      subsSnap.forEach(doc => subs.push({id:doc.id,...doc.data()}));
      
      const subsHtml = subs.map(s=>{
        const statusColors={active:'var(--success)',pending:'var(--warning)',expired:'var(--error)'};
        const date = s.createdAt?.toDate?.() ? new Date(s.createdAt.toDate()).toLocaleDateString() : 'Recent';
        return `<div class="card" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <div style="display:flex;gap:12px;align-items:center">
            <div style="width:48px;height:48px;border-radius:12px;background:rgba(245,158,11,0.1);display:flex;align-items:center;justify-content:center;font-size:24px">🎫</div>
            <div>
              <div style="font-weight:700">${s.userName||'User'}</div>
              <div style="font-size:13px;color:var(--text-secondary)">${s.plan||'plus'} plan • ${s.amount?.toLocaleString()||'4,999'} SYP • ${date}</div>
            </div>
          </div>
          <div style="display:flex;gap:10px;align-items:center">
            <span style="padding:4px 10px;border-radius:100px;font-size:11px;font-weight:600;background:${statusColors[s.status]||'var(--text-tertiary)'}20;color:${statusColors[s.status]||'var(--text-tertiary)'}">${s.status||'unknown'}</span>
            ${s.status==='pending'?`
            <button class="btn btn-primary btn-sm" onclick="approveSubscription('${s.id}','${s.userId}')">Approve</button>
            `:''}
          </div>
        </div>`;
      }).join('');
      
      return `<div class="page-header animate-fade-up"><h1 class="page-title">Subscriptions (${subs.length})</h1></div>
      ${subsHtml||'<div class="card" style="text-align:center;padding:40px"><div style="font-size:48px;margin-bottom:12px">🎫</div><div style="color:var(--text-secondary)">No subscription requests</div></div>'}`;
    }
    
    window.approveSubscription = async (subId, userId) => {
      try {
        const {updateDoc} = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
        await updateDoc(doc(db,'subscriptions',subId),{status:'active',approvedAt:new Date()});
        await updateDoc(doc(db,'users',userId),{subscriptionStatus:'active'});
        showToast('Subscription approved!');
        showPage('subscriptions');
      } catch(e) {
        showToast('Error: '+e.message,'error');
      }
    };
    
    // Helper functions
    function userCard(name,email,role,status){
      const rc={customer:'var(--primary)',driver:'#22C55E',partner:'#F59E0B'};
      return `<div class="card" style="display:flex;justify-content:space-between;align-items:center">
        <div style="display:flex;gap:12px;align-items:center">
          <div style="width:40px;height:40px;border-radius:50%;background:${rc[role]||'var(--primary)'};display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:14px">${name.charAt(0).toUpperCase()}</div>
          <div><div style="font-weight:600">${name}</div><div style="font-size:13px;color:var(--text-secondary)">${email}</div></div>
        </div>
        <span style="padding:4px 10px;border-radius:100px;font-size:11px;font-weight:600;background:rgba(34,197,94,0.1);color:var(--success)">${status}</span>
      </div>`;
    }
    
    window.filterUsers = (search, role) => {
      const filtered = allUsers.filter(u => 
        (u.role===role || (role==='partner' && u.role==='owner')) &&
        (u.displayName?.toLowerCase().includes(search.toLowerCase()) || 
         u.email?.toLowerCase().includes(search.toLowerCase()))
      );
      const list = document.getElementById('usersList');
      if(list) {
        list.innerHTML = filtered.map(u=>userCard(u.displayName||'User',u.email||'No email',role,u.isOnline?'Online':'Active')).join('') || '<div class="card" style="text-align:center;padding:20px;color:var(--text-secondary)">No results found</div>';
      }
    };
    
    const savedTheme=localStorage.getItem('tayyebgo-theme');
    if(savedTheme)document.documentElement.setAttribute('data-theme',savedTheme);
  </script>
</body>
</html>
