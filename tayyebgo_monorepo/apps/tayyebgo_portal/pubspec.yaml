name: tayyebgo_portal
description: TayyebGo Unified Login Portal — role-based dashboard routing
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  go_router: ^17.2.3
  intl: ^0.20.2
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  tayyebgo_core:
    path: ../../packages/tayyebgo_core
  tayyebgo_customer:
    path: ../tayyebgo_customer
  tayyebgo_driver:
    path: ../tayyebgo_driver
  tayyebgo_partner:
    path: ../tayyebgo_partner
  tayyebgo_admin:
    path: ../tayyebgo_admin

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
