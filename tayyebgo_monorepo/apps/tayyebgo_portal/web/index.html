<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <meta name="theme-color" content="#FF5A2C">
  <meta name="description" content="TayyebGo — Order food, groceries, pharmacy & retail from local stores. Fast delivery, real-time tracking.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TayyebGo">
  <meta name="application-name" content="TayyebGo">
  <meta name="msapplication-TileColor" content="#FF5A2C">
  <meta name="msapplication-tap-highlight" content="no">

  <!-- Open Graph -->
  <meta property="og:title" content="TayyebGo — Multi-Store Delivery Platform">
  <meta property="og:description" content="Order food, groceries, pharmacy & retail from your favorite local stores.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="icons/Icon-512.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="manifest" href="manifest.json">

  <title>TayyebGo — Multi-Store Delivery Platform</title>

  <style>
    body {
      background-color: #090B10;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #273043;
      border-top-color: #FF5A2C;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .loading-text {
      color: #B8C0CC;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loading">
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading TayyebGo...</div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
