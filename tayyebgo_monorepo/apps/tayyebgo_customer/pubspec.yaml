publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  provider: ^6.1.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  url_launcher: ^6.2.4
  intl: ^0.20.2
  go_router: ^17.2.3
  flutter_map: ^8.3.0
