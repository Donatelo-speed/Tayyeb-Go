name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  analyze:
    name: Analyze Code
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [tayyebgo_customer, tayyebgo_driver, tayyebgo_partner, tayyebgo_admin]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: 'stable'
          cache: true
      
      - name: Get dependencies
        working-directory: apps/${{ matrix.app }}
        run: flutter pub get
      
      - name: Analyze code
        working-directory: apps/${{ matrix.app }}
        run: flutter analyze
      
      - name: Check formatting
        working-directory: apps/${{ matrix.app }}
        run: dart format --set-exit-if-changed .

  test:
    name: Test Apps
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [tayyebgo_customer, tayyebgo_driver, tayyebgo_partner, tayyebgo_admin]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: 'stable'
          cache: true
      
      - name: Get dependencies
        working-directory: apps/${{ matrix.app }}
        run: flutter pub get
      
      - name: Run unit tests
        working-directory: apps/${{ matrix.app }}
        run: flutter test --coverage
      
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: apps/${{ matrix.app }}/coverage/lcov.info
          flags: ${{ matrix.app }}
          name: codecov-${{ matrix.app }}

  test-packages:
    name: Test Packages
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [tayyebgo_core, tayyebgo_multi_tenant]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: 'stable'
          cache: true
      
      - name: Get dependencies
        working-directory: packages/${{ matrix.package }}
        run: flutter pub get
      
      - name: Run unit tests
        working-directory: packages/${{ matrix.package }}
        run: flutter test --coverage
      
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: packages/${{ matrix.package }}/coverage/lcov.info
          flags: ${{ matrix.package }}
          name: codecov-${{ matrix.package }}

  build:
    name: Build Apps
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [tayyebgo_customer, tayyebgo_driver, tayyebgo_partner, tayyebgo_admin]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: 'stable'
          cache: true
      
      - name: Get dependencies
        working-directory: apps/${{ matrix.app }}
        run: flutter pub get
      
      - name: Build web
        working-directory: apps/${{ matrix.app }}
        run: flutter build web --release
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-web-build
          path: apps/${{ matrix.app }}/build/web
          retention-days: 7

  deploy:
    name: Deploy Customer App
    runs-on: ubuntu-latest
    needs: [analyze, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Download customer build
        uses: actions/download-artifact@v4
        with:
          name: tayyebgo_customer-web-build
          path: build/web

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: tayyebgo

  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Rollback to previous release
        run: |
          echo "Deploy failed — rolling back to previous version..."
          firebase hosting:rollback --project tayyebgo --message "Auto-rollback: deploy ${{ github.sha }} failed" || echo "Rollback command not available, manual intervention needed"

      - name: Notify on rollback
        if: always()
        run: |
          echo "## Deployment Failed" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Status: Rolled back to previous version" >> $GITHUB_STEP_SUMMARY

  cloud-functions-build:
    name: Build Cloud Functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cloud_functions/functions/package-lock.json
      
      - name: Install dependencies
        working-directory: cloud_functions/functions
        run: npm ci
      
      - name: Build TypeScript
        working-directory: cloud_functions/functions
        run: npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cloud-functions-build
          path: cloud_functions/functions/lib
          retention-days: 7
