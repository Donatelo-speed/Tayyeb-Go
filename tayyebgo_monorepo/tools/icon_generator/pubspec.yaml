name: tayyebgo_icons
description: Generate app icons for TayyebGo apps

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter_launcher_icons: ^0.13.1
  path: ^1.8.0

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: "assets/icon/icon.png"
    background_color: "#F97316"
    theme_color: "#F97316"
  windows:
    generate: true
    image_path: "assets/icon/icon.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/icon/icon.png"