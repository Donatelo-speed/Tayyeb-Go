name: tayyebgo_core
description: Core functionality for TayyebGo ecosystem
version: 0.1.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cloud_firestore: ^5.6.12
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  firebase_storage: ^12.4.4
  firebase_messaging: ^15.2.2
  cloud_functions: ^5.3.6
