name: tayyebgo_core
description: Shared core package for TayyebGo monorepo — Firebase, models, services, providers
version: 1.0.0
publish_to: none

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  go_router: ^17.2.3
  cloud_firestore: ^5.6.12
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  cloud_functions: ^5.3.6
  uuid: ^4.5.1
  intl: ^0.20.2
  shared_preferences: ^2.2.2
  http: ^1.2.0
  connectivity_plus: ^6.0.3
  geolocator: ^14.0.2
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  provider: ^6.1.2
  image_picker: ^1.1.2
  firebase_storage: ^12.4.4
  google_sign_in: ^6.2.1
  pin_code_fields: ^8.0.1
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  url_launcher: ^6.2.5
  firebase_messaging: ^15.2.2
  flutter_stripe: ^11.1.0
  sqflite: ^2.3.0
  path: ^1.8.0

dev_dependencies:
  test: ^1.25.8
