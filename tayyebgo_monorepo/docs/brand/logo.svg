<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="50%" style="stop-color:#FF8C42"/>
      <stop offset="100%" style="stop-color:#FFB347"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#FFF5EB"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#FF6B35" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#brandGrad)" filter="url(#shadow)"/>
  <!-- Delivery path / road -->
  <path d="M55 130 Q70 110 100 115 Q130 120 145 100" stroke="url(#iconGrad)" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.4"/>
  <!-- Location pin / map marker -->
  <g transform="translate(100, 75)">
    <path d="M0-35 C-20-35 -35-20 -35 0 C-35 25 0 50 0 50 C0 50 35 25 35 0 C35-20 20-35 0-35Z" fill="url(#iconGrad)"/>
    <circle cx="0" cy="-2" r="12" fill="url(#brandGrad)"/>
    <!-- Arrow up inside pin -->
    <path d="M0-12 L5-4 L2-4 L2 8 L-2 8 L-2-4 L-5-4Z" fill="url(#iconGrad)"/>
  </g>
  <!-- Speed lines -->
  <line x1="45" y1="85" x2="55" y2="85" stroke="#FFF" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="40" y1="95" x2="52" y2="95" stroke="#FFF" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="48" y1="105" x2="56" y2="105" stroke="#FFF" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
</svg>