<body class="bg-surface-container-high text-on-surface antialiased h-screen overflow-hidden flex justify-center">
<!-- Mobile Device Container -->
<div class="w-full max-w-md h-full relative bg-surface-container-lowest shadow-2xl overflow-hidden flex flex-col">
<!-- Header (Floating over Map) -->

<button class="w-10 h-10 rounded-full bg-surface-container-lowest/90 backdrop-blur-sm shadow-sm flex items-center justify-center pointer-events-auto text-on-surface border border-surface-variant">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="bg-surface-container-lowest/90 backdrop-blur-sm px-4 py-2 rounded-full shadow-sm pointer-events-auto border border-surface-variant">
<span class="font-label-lg text-label-lg text-primary-container">#9942</span>
</div>
</header>
<!-- Map Background Area -->
<div class="h-[45%] w-full bg-surface-variant relative overflow-hidden flex-shrink-0">

<div class="absolute inset-x-0 bottom-0 h-24 bg-gradient-to-t from-surface-container-lowest to-transparent"></div>
</div>
<!-- Tracking Details Bottom Sheet -->
<div class="flex-1 bg-surface-container-lowest w-full rounded-t-xl -mt-6 z-10 relative flex flex-col shadow-[0_-8px_24px_rgba(0,0,0,0.05)]">
<!-- Drag Handle Indicator -->
<div class="w-full flex justify-center pt-3 pb-1 shrink-0">
<div class="w-12 h-1.5 rounded-full bg-surface-variant"></div>
</div>
<!-- Scrollable Content -->
<div class="flex-1 overflow-y-auto px-md pb-8">
<!-- ETA Section -->
<div class="text-center py-sm">
<h2 class="font-title-lg text-title-lg text-on-surface">12 mins</h2>
<p class="font-body-lg text-body-lg text-primary-container mt-1">Arriving at your location</p>
</div>
<!-- Status Timeline -->
<div class="mt-sm mb-lg bg-surface-container-lowest border border-surface-variant rounded-lg p-sm shadow-sm">
<div class="relative pl-4 py-2">
<!-- Connecting Line Background -->
<div class="absolute left-[23px] top-6 bottom-6 w-[2px] bg-surface-variant"></div>
<!-- Active Connecting Line (Progress) -->
<div class="absolute left-[23px] top-6 h-[50%] w-[2px] bg-primary-container"></div>
<!-- Step 1: Placed -->
<div class="flex items-start gap-4 mb-6 relative z-10">
<div class="w-4 h-4 rounded-full bg-primary-container ring-4 ring-surface-container-lowest mt-1 shadow-sm flex items-center justify-center">
<span class="material-symbols-outlined text-[10px] text-on-primary-container font-bold">check</span>
</div>
<div>
<h3 class="font-label-lg text-label-lg text-on-surface">Order Placed</h3>
<p class="font-body-md text-body-md text-on-surface-variant">10:42 AM</p>
</div>
</div>
<!-- Step 2: Preparing -->
<div class="flex items-start gap-4 mb-6 relative z-10">
<div class="w-4 h-4 rounded-full bg-primary-container ring-4 ring-surface-container-lowest mt-1 shadow-sm flex items-center justify-center">
<span class="material-symbols-outlined text-[10px] text-on-primary-container font-bold">check</span>
</div>
<div>
<h3 class="font-label-lg text-label-lg text-on-surface">Preparing</h3>
<p class="font-body-md text-body-md text-on-surface-variant">10:45 AM</p>
</div>
</div>
<!-- Step 3: Out for Delivery (Active) -->

<div class="w-4 h-4 rounded-full bg-primary-container ring-4 ring-primary-fixed mt-1 shadow-sm animate-pulse"></div>
<div>
<h3 class="font-label-lg text-label-lg text-primary-container font-bold">Out for Delivery</h3>
<p class="font-body-md text-body-md text-on-surface-variant">Heading your way</p>
</div>
</div>
<!-- Step 4: Delivered -->
<div class="flex items-start gap-4 relative z-10">
<div class="w-4 h-4 rounded-full bg-surface-variant ring-4 ring-surface-container-lowest mt-1"></div>
<div>
<h3 class="font-label-lg text-label-lg text-on-surface-variant">Delivered</h3>
<p class="font-body-md text-body-md text-outline">Pending</p>
</div>
</div>
</div>
</div>

<div class="relative">
<img alt="Driver Profile" class="w-12 h-12 rounded-full object-cover border-2 border-surface-container-lowest shadow-sm" data-alt="A professional headshot of a friendly delivery driver wearing a clean, modern uniform. The lighting is soft and natural, suggesting a bright daytime environment. The background is slightly blurred to keep focus on the subject. The overall mood is approachable, reliable, and consistent with a high-quality service brand." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAxZwfAs8vyn6RuAGHZqkc0TDc--mcow2_cAYq5vnbq5bDMBS50yjCpcLzwAEYmmuFbzRGcOaz1ptsejuDAXr-umafxOgrzZ8BW5rTO-qccdQ51vmlHy-OmXpVDvyIXxgjEekRS65bgoqpb6saVmCU8Od4zRHfxCbpkdM6bCQu8WQwNPrnfM33QbmWV7E0REtO2Hzcfr3lve3gh85FcVEEEjNZziWaIZMHh231OeqhLQBj3bcAzHC1Zyf4RD6MU1WoG32-WftZaYzs"/>
<div class="absolute -bottom-1 -right-1 bg-surface-container-lowest rounded-full p-0.5 shadow-sm">
<div class="w-3 h-3 bg-secondary rounded-full"></div>

</div>
<div>

<p class="font-body-md text-body-md text-on-surface-variant">Toyota Prius • AB12 3CD</p>
</div>
</div>

</button>

</button>
</div>
</div>

<div class="bg-surface-container-lowest border border-surface-variant rounded-lg p-sm mb-lg shadow-sm">

<h3 class="font-title-lg text-title-lg text-on-surface text-[18px]">Luigi's Pizza</h3>
</div>
<div class="flex flex-col gap-xxs mb-sm">
<div class="flex justify-between items-start">
<div class="flex gap-2">
<span class="font-label-lg text-label-lg text-on-surface-variant">1x</span>
<span class="font-body-lg text-body-lg text-on-surface">Pepperoni Pizza</span>
</div>
<span class="font-body-lg text-body-lg text-on-surface">$18.00</span>
</div>
<div class="flex justify-between items-start">
<div class="flex gap-2">
<span class="font-label-lg text-label-lg text-on-surface-variant">1x</span>
<span class="font-body-lg text-body-lg text-on-surface">Garlic Bread</span>
</div>
<span class="font-body-lg text-body-lg text-on-surface">$4.50</span>
</div>
</div>
<div class="flex justify-between items-center pt-xxs border-t border-surface-variant">
<span class="font-label-lg text-label-lg text-on-surface-variant">Total</span>
<span class="font-title-lg text-title-lg text-on-surface text-[20px]">$24.50</span>
</div>
</div>
<!-- Support Link -->
<div class="text-center mt-lg pb-4">
<button class="font-label-lg text-label-lg text-primary-container hover:underline flex items-center justify-center gap-1 mx-auto">
<span class="material-symbols-outlined text-[16px]">help</span>
                        Help &amp; Support
                    </button>
</div>
</div>
</div>
</div>
